<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA5 Weekly Practice</title>

<style>
body {
  margin: 0;
  font-family: "Century Gothic", Arial, sans-serif;
  background: linear-gradient(#a8d8f0, #dff3ff);
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 3em;
  color: white;
  margin: 30px 0 10px;
  text-shadow: 3px 3px rgba(0,0,0,0.2);
  font-weight: bold;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  max-width: 1000px;
  margin: 30px auto;
  padding: 20px;
}

/* CARD */
.card {
  border-radius: 20px;
  padding: 20px;
  color: #333;
  box-shadow: 0 8px 15px rgba(0,0,0,0.15);
  position: relative;
  border: 5px solid white;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* ICON */
.icon {
  font-size: 40px;
  margin-bottom: 10px;
}

/* TEXT */
.card h2 {
  margin: 5px 0;
  font-size: 1.4em;
  font-weight: bold;
}

.card p {
  font-size: 0.95em;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  background: #4CAF50;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* COLORS (MATCH IMAGE STYLE) */
.green { background: #d9f2d9; }
.yellow { background: #ffeaa7; }
.blue { background: #cfe8ff; }
.orange { background: #ffd3a6; }
.purple { background: #e4d4ff; }

/* NEW BADGE */
.new {
  position: absolute;
  top: -10px;
  right: -10px;
  background: red;
  color: white;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: bold;
}

</style>
</head>

<body>

<h1>🌟 GA5 Weekly Practice</h1>

<div class="container">

  <!-- 🔥 ADD NEW WEEKS HERE 🔥 -->

  <!-- WEEK TEMPLATE -->
  <div class="card green">
    <div class="new">NEW</div>
    <div class="icon">🎯</div>
    <h2>Week 4</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="PASTE-YOUR-LINK" target="_blank">Start</a>
  </div>

  <!-- OLD WEEKS -->

  <div class="card yellow">
    <div class="icon">📘</div>
    <h2>Week 3</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="LINK" target="_blank">Start</a>
  </div>

  <div class="card blue">
    <div class="icon">📝</div>
    <h2>Week 2</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="LINK" target="_blank">Start</a>
  </div>

  <div class="card orange">
    <div class="icon">🎮</div>
    <h2>Week 1</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="LINK" target="_blank">Start</a>
  </div>

</div>

</body>
</html>
