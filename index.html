<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA5 Weekly Practice</title>

<style>
body {
  font-family: "Comic Sans MS", Arial;
  background: linear-gradient(#bfe9ff, #eefbff);
  text-align: center;
  padding: 20px;
}

/* Title */
h1 {
  font-size: 3em;
  color: white;
  text-shadow: 3px 3px #00000030;
  margin-bottom: 20px;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
}

/* Card */
.card {
  background: white;
  border-radius: 25px;
  padding: 25px;
  margin: 25px 0;
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
  position: relative;
  border: 5px solid #ffffff;
}

/* Emoji icon */
.icon {
  font-size: 40px;
}

/* Week title */
.card h2 {
  margin: 10px 0;
  font-size: 1.8em;
}

/* Button */
.btn {
  display: inline-block;
  margin-top: 12px;
  padding: 12px 25px;
  background: linear-gradient(#4CAF50, #2e9e36);
  color: white;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  font-size: 1.1em;
}

/* NEW badge */
.new {
  position: absolute;
  top: -12px;
  right: -12px;
  background: red;
  color: white;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: bold;
}

/* Fun colors (optional use) */
.green { background: #eaffea; }
.yellow { background: #fff6d6; }
.blue { background: #e6f3ff; }
.purple { background: #f3e8ff; }

</style>
</head>

<body>

<h1>🌟 GA5 Weekly Practice</h1>

<div class="container">

  <!-- 🔥 ADD NEW WEEKS HERE 🔥 -->

  <!-- WEEK TEMPLATE (COPY THIS EACH WEEK) -->
  <div class="card green">
    <div class="new">NEW</div>
    <div class="icon">🎯</div>
    <h2>Week 4</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="PASTE-YOUR-LINK" target="_blank">Start</a>
  </div>


  <!-- OLD WEEKS BELOW (DON'T TOUCH) -->

  <div class="card yellow">
    <div class="icon">📘</div>
    <h2>Week 3</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="LINK" target="_blank">Start</a>
  </div>

  <div class="card blue">
    <div class="icon">📝</div>
    <h2>Week 2</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="LINK" target="_blank">Start</a>
  </div>

  <div class="card purple">
    <div class="icon">🎮</div>
    <h2>Week 1</h2>
    <p>Weekly Review Practice</p>
    <a class="btn" href="LINK" target="_blank">Start</a>
  </div>

</div>

</body>
</html>
